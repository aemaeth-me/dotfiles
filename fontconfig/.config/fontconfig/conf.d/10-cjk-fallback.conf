<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test name="family" qual="any">
      <string>UbuntuMono Nerd Font Mono</string>
    </test>
    <edit name="family" mode="append">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>
</fontconfig>
